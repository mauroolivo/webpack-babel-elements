<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title><%= pageTitle %></title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Palatino", "Book Antiqua", serif;
        background:
          radial-gradient(circle at top left, rgba(144, 201, 185, 0.34), transparent 34%),
          linear-gradient(165deg, #f4efe7 0%, #e7e5dd 55%, #f8f4ed 100%);
        color: #1f1b15;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <noscript>This chapter needs JavaScript enabled because the page is rendered by the webpack bundle.</noscript>
  </body>
</html>
