<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="<%= pageDescription %>" />
    <title><%= pageTitle %></title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Garamond", "Book Antiqua", serif;
        background:
          radial-gradient(circle at top left, rgba(162, 200, 191, 0.36), transparent 32%),
          linear-gradient(165deg, #f4efe5 0%, #e9e2d6 55%, #f8f4ee 100%);
        color: #1e1914;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body data-entry="<%= entryName %>">
    <main id="app"></main>
  </body>
</html>
